<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANTOS BRAVOS</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;display:flex}
.sidebar{width:260px;background:#1a1a1a;height:100vh;overflow:auto;padding:15px}
.main{flex:1;padding:20px}
h2{margin:0 0 10px}
.cat-btn{margin:3px;padding:8px;background:#333;border:none;color:#fff;cursor:pointer}
.cat-btn.active{background:#555}
.sub{margin-top:10px;font-size:13px;color:#aaa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.card{background:#222;border-radius:8px;overflow:hidden;cursor:pointer}
.card img{width:100%}
.topbar{display:flex;justify-content:space-between;margin-bottom:10px}
button{cursor:pointer}
</style>
</head>

<body>

<div class="sidebar">
<h2>산토스 브라보스 콘텐츠</h2>

<div>
<button class="cat-btn" onclick="setCategory('방송')">방송</button>
<button class="cat-btn" onclick="setCategory('자컨')">자컨</button>
<button class="cat-btn" onclick="setCategory('무대')">무대</button>
<button class="cat-btn" onclick="setCategory('사진')">사진</button>
</div>

<div class="sub" id="subList"></div>

<hr>

<div id="loginBox">
<input id="id" placeholder="ID"><br>
<input id="pw" placeholder="PW" type="password"><br>
<button onclick="login()">로그인</button>
</div>

<div id="adminBox" style="display:none">
<h4>관리자</h4>
<input id="title" placeholder="제목"><br>
<input id="img" placeholder="썸네일 URL"><br>
<input id="link" placeholder="링크 URL"><br>
<input id="date" type="date"><br>
<button onclick="addItem()">추가</button>
</div>

</div>

<div class="main">

<div class="topbar">
<h2 id="titleText">방송</h2>
</div>

<div class="grid" id="grid"></div>

</div>

<script>
let category="방송"

let subs=[
"Behind - 비하인드",
"Interview - 인터뷰",
"Live - 라이브",
"Music Show - 음악방송",
"Variety - 예능"
]

subs.sort((a,b)=>a.localeCompare(b,'ko'))

function renderSubs(){
document.getElementById("subList").innerHTML=subs.map(s=>"<div>"+s+"</div>").join("")
}
renderSubs()

function setCategory(c){
category=c
document.getElementById("titleText").innerText=c
render()
}

function getData(){
return JSON.parse(localStorage.getItem("data")||"[]")
}

function saveData(d){
localStorage.setItem("data",JSON.stringify(d))
}

function render(){
let data=getData().filter(i=>i.category===category)
data.sort((a,b)=>new Date(b.date)-new Date(a.date))

let html=data.map(i=>`
<div class="card" onclick="go('${i.link}')">
<img src="${i.img}">
<div style="padding:5px">${i.title}<br><small>${i.date}</small></div>
</div>
`).join("")

document.getElementById("grid").innerHTML=html
}

function go(link){
window.open(link)
}

function login(){
if(id.value==="admin" && pw.value==="1234"){
document.getElementById("adminBox").style.display="block"
document.getElementById("loginBox").style.display="none"
}
}

function addItem(){
let d=getData()
d.push({
category,
title:title.value,
img:img.value,
link:link.value,
date:date.value
})
saveData(d)
render()
}

render()
</script>

</body>
</html>
